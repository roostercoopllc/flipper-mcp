apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - c2-agent-configmap.yaml
  - c2-agent-deployment.yaml
  # Ollama is NOT deployed in the base config — it uses the remote server
  # at OLLAMA_URL in the ConfigMap.
  #
  # For a fully self-contained deployment (no remote Ollama required), use:
  #   kubectl apply -k infra/k8s/overlays/standalone/

commonLabels:
  project: flipper-mcp
  component: c2-demo
