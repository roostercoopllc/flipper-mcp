services:
  relay:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "${RELAY_PORT:-9090}:9090"
    environment:
      - RUST_LOG=${RUST_LOG:-flipper_mcp_relay=info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      relay:
        condition: service_healthy
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
